  <g id="section_notice_002">
    <rect id="background" class="cls-4" x="20.96" y="628.41" width="964.71" height="385.4"/>
    <text id="body" class="cls-1" transform="translate(97.38 732.18)"><tspan x="0" y="0">是非成败转头空，青山依旧在，惯看秋月春风。一壶浊酒喜相逢，古今多少</tspan><tspan x="0" y="28.8">事，滚滚长江东逝水，浪花淘尽英雄。 几度夕阳红。白发渔樵江渚上，都付</tspan><tspan x="0" y="57.6">笑谈中。</tspan><tspan x="0" y="86.4">是非成败转头空，青山依旧在，惯看秋月春风。一壶浊酒喜相逢，古今多少</tspan><tspan x="0" y="115.2">事，滚滚长江东逝水，浪花淘尽英雄。 几度夕阳红。白发渔樵江渚上，都付</tspan><tspan x="0" y="144">笑谈中。</tspan><tspan x="0" y="172.8">是非成败转头空，青山依旧在，惯看秋月春风。一壶浊酒喜相逢，古今多少</tspan><tspan x="0" y="201.6">事，滚滚长江东逝水，浪花淘尽英雄。 几度夕阳红。白发渔樵江渚上，都付</tspan><tspan x="0" y="230.4">笑谈中。</tspan></text>
    <text id="title" class="cls-1" transform="translate(97.91 681.2)"><tspan x="0" y="0">这是第二个标题</tspan></text>
  </g>
